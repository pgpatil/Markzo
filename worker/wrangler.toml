name = "markzo-timetable-reader"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Secrets (never put these here — set via `wrangler secret put <NAME>`):
#   ANTHROPIC_API_KEY  (required)
#   SHARED_SECRET      (optional — see README)
#
# Optional plain vars, uncomment to override defaults:
# [vars]
# ANTHROPIC_MODEL = "claude-opus-4-8"
# ALLOWED_ORIGIN = "https://your-username.github.io"
