<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Markzo — Timetable reader</title>
<style>
  :root{--paper:#f3efe6;--card:#fff;--ink:#22242a;--soft:#5b6069;--faint:#9a9ea7;
    --line:#e6e0d3;--read:#2f6f5e;--read-soft:#e3efe9;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Inter",system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;padding-bottom:50px;}
  .wrap{max-width:560px;margin:0 auto;padding:0 18px;}
  header{padding:26px 0 8px;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#d98324;}
  h1{margin:6px 0 4px;font-size:26px;letter-spacing:-.02em;}
  .lead{color:var(--soft);font-size:15px;margin-bottom:18px;}
  .keybar{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:16px;}
  .keybar label{font-size:12px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.04em;}
  .keybar input{width:100%;margin-top:6px;padding:10px;border:1px solid var(--line);border-radius:9px;font-size:13px;font-family:inherit;background:var(--paper);}
  .drop{border:1.5px dashed var(--line);border-radius:16px;background:var(--card);padding:30px 18px;text-align:center;cursor:pointer;}
  .drop svg{width:34px;height:34px;stroke:var(--faint);fill:none;stroke-width:1.6;margin-bottom:8px;}
  .drop p{margin:0;font-size:14.5px;color:var(--soft);}
  .drop .h{font-size:12.5px;color:var(--faint);margin-top:4px;}
  img.preview{width:100%;border-radius:14px;margin:16px 0;border:1px solid var(--line);}
  .btn{display:block;width:100%;background:var(--read);color:#fff;border:none;font-weight:650;font-size:15.5px;padding:14px;border-radius:13px;cursor:pointer;margin-top:6px;font-family:inherit;}
  .btn:disabled{opacity:.5;}
  .status{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--soft);padding:14px 0;}
  .spin{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--read);border-radius:50%;animation:s .7s linear infinite;}
  @keyframes s{to{transform:rotate(360deg);}}
  .sec{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);margin:22px 2px 10px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;}
  .row{display:flex;justify-content:space-between;padding:9px 0;border-top:1px solid var(--line);font-size:14.5px;}
  .row:first-child{border-top:none;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th,td{border:1px solid var(--line);padding:5px 6px;text-align:center;}
  th{background:var(--read-soft);color:var(--read);font-weight:700;}
  td.subj{font-weight:600;}
  .err{background:#fdeceb;border:1px solid #f4c7c2;color:#c0392b;padding:14px;border-radius:12px;font-size:13.5px;margin-top:14px;white-space:pre-wrap;word-break:break-word;}
  .note{font-size:12.5px;color:var(--faint);margin-top:10px;line-height:1.5;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Markzo</div>
    <h1>Read my timetable</h1>
    <p class="lead">Photograph your school timetable. It reads the hours, days, and the subject in each period — automatically.</p>
  </header>

  <div class="keybar">
    <label>Your backend URL</label>
    <input id="workerUrl" value="https://yellow-river-2f4e.pankajpclaude.workers.dev" />
  </div>

  <div class="drop" id="drop" onclick="document.getElementById('file').click()">
    <svg viewBox="0 0 24 24"><path d="M12 16V4m0 0L8 8m4-4l4 4"/><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
    <p>Tap to add a timetable photo</p>
    <div class="h">A clear, straight-on photo reads best</div>
  </div>
  <input type="file" id="file" accept="image/*" style="display:none" onchange="onFile(event)">

  <img id="preview" class="preview" style="display:none">
  <button class="btn" id="readBtn" style="display:none" onclick="readIt()">Read this timetable</button>
  <div id="out"></div>
</div>

<script>
let dataUrl=null;
function onFile(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    // shrink large photos so the model reads faster (max 1600px wide)
    const img=new Image();
    img.onload=()=>{
      const maxW=1600;
      let w=img.width, h=img.height;
      if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      dataUrl=c.toDataURL('image/jpeg',0.85);
      const p=document.getElementById('preview'); p.src=dataUrl; p.style.display='block';
      document.getElementById('readBtn').style.display='block';
      document.getElementById('out').innerHTML='';
    };
    img.src=r.result;
  };
  r.readAsDataURL(f);
}
const PROMPT=`Read this school class timetable image and return ONLY valid JSON (no prose, no markdown fences) in exactly this shape:
{"schoolStart":"HH:MM","schoolEnd":"HH:MM","days":["MO","TU","WE","TH","FR"],"periods":[{"start":"HH:MM","end":"HH:MM"}],"subjectsByDay":{"MO":["Subject"]},"breaks":[{"name":"Short Break","start":"HH:MM","end":"HH:MM"}]}
Rules: 24-hour times (a period "1.20 to 2.00 p.m." = 13:20 to 14:00). Use the period time row to define periods. Map each cell subject exactly; expand abbreviations only if the image shows a legend. Put empty string for break/free slots and list breaks separately. Always return valid JSON.`;

async function readIt(){
  const out=document.getElementById('out');
  const btn=document.getElementById('readBtn');
  const url=document.getElementById('workerUrl').value.trim();
  if(!url){ out.innerHTML='<div class="err">Paste your backend URL first.</div>'; return; }
  btn.disabled=true;
  out.innerHTML='<div class="status"><div class="spin"></div>Reading your timetable…</div>';
  try{
    const res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({imageDataUrl:dataUrl, prompt:PROMPT})});
    const data=await res.json();
    if(data.error){ out.innerHTML='<div class="err">Backend error: '+(data.error)+(data.detail?'\n\n'+JSON.stringify(data.detail).slice(0,400):'')+'</div>'; btn.disabled=false; return; }
    let text=data.text||'';
    text=text.replace(/```json/gi,'').replace(/```/g,'').trim();
    const a=text.indexOf('{'), b=text.lastIndexOf('}');
    if(a>=0&&b>a) text=text.slice(a,b+1);
    let parsed;
    try{ parsed=JSON.parse(text); }
    catch(pe){ out.innerHTML='<div class="err">Read the image but could not structure it. Raw reply:\n\n'+text.slice(0,600)+'</div>'; btn.disabled=false; return; }
    render(parsed);
  }catch(err){
    out.innerHTML='<div class="err">Could not reach the backend: '+(err&&err.message||err)+'</div>';
  }
  btn.disabled=false;
}
const DN={MO:'Mon',TU:'Tue',WE:'Wed',TH:'Thu',FR:'Fri',SA:'Sat',SU:'Sun'};
function t12(t){if(!t)return'';let[h,m]=t.split(':').map(Number);const ap=h>=12?'pm':'am';h=h%12||12;return h+(m?':'+String(m).padStart(2,'0'):'')+ap;}
function render(d){
  const out=document.getElementById('out');
  let html='<div class="sec">School hours</div><div class="card">';
  html+='<div class="row"><span>School day</span><b>'+t12(d.schoolStart)+' – '+t12(d.schoolEnd)+'</b></div>';
  html+='<div class="row"><span>Days</span><b>'+(d.days||[]).map(x=>DN[x]||x).join(' · ')+'</b></div>';
  (d.breaks||[]).forEach(b=>html+='<div class="row"><span>'+(b.name||'Break')+'</span><b>'+t12(b.start)+' – '+t12(b.end)+'</b></div>');
  html+='</div>';
  if(d.periods&&d.subjectsByDay){
    html+='<div class="sec">Subjects by period</div><div class="card" style="overflow-x:auto;padding:10px"><table><tr><th>Day</th>';
    d.periods.forEach(p=>html+='<th>'+t12(p.start)+'</th>');
    html+='</tr>';
    (d.days||Object.keys(d.subjectsByDay)).forEach(day=>{
      const s=d.subjectsByDay[day]||[];
      html+='<tr><td><b>'+(DN[day]||day)+'</b></td>';
      d.periods.forEach((p,i)=>html+='<td class="subj">'+(s[i]||'–')+'</td>');
      html+='</tr>';
    });
    html+='</table></div><div class="note">Read automatically from your photo through your own backend. In the app you confirm anything off before it saves.</div>';
  }
  out.innerHTML=html;
}
</script>
</body>
</html>
